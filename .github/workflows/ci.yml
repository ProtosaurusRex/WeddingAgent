name: Wedding Agent CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ── Use Case 6: Dependency & Import Health ──────────────────
  import-check:
    name: "[UC6] Dependency & Import Health"
    runs-on: windows-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import tests
        run: pytest tests/test_imports.py -v


  # ── Use Case 5: DB Query Sanity Check ───────────────────────
  db-check:
    name: "[UC5] Database Sanity Check"
    runs-on: ubuntu-latest
    needs: [import-check]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run DB tool tests
        run: pytest tests/test_db_tool.py -v


  # ── Use Cases 1/3: Prompt Regression + Tool Coverage ────────
  regression:
    name: "[UC1/3] Prompt Regression & Tool Coverage"
    runs-on: ubuntu-latest
    needs: [db-check]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run regression tests
        run: pytest tests/test_regression.py -v


  # ── Use Case 2: Output Schema Validation ─────────────────────
  schema:
    name: "[UC2] Output Schema Validation"
    runs-on: ubuntu-latest
    needs: [db-check]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run schema tests
        run: pytest tests/test_schema.py -v


  # ── Use Case 4: Prompt Variant A/B Testing ───────────────────
  ab-variants:
    name: "[UC4] Prompt Variant A/B Test"
    runs-on: ubuntu-latest
    needs: [regression, schema]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Run A/B variant tests
        run: pytest tests/test_ab_variants.py -v -s

      - name: Write variant scores to job summary
        if: always()
        run: |
          echo "## Prompt Variant Scores" >> $GITHUB_STEP_SUMMARY
          echo "See test output above for full scoring breakdown." >> $GITHUB_STEP_SUMMARY
